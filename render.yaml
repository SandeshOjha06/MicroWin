services:
  - type: web
    name: microwin-app
    env: docker
    plan: free
    healthCheckPath: /api/v1/tasks/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: microwin-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: microwin-db
    databaseName: microwin
    user: microwin
    plan: free
